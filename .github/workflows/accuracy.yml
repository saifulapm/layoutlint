name: accuracy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  accuracy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install pinned Chromium (the oracle)
        run: npx playwright install chromium --with-deps

      - name: Typecheck
        run: |
          npx tsc --noEmit
          npx tsc --noEmit -p corpora/react/tsconfig.json

      - name: Unit tests (rules, resolver, check API)
        run: bun test

      # The published package must run under plain Node (no Bun) — including
      # React component execution (esbuild TSX transpile + user-react render).
      - name: Build npm package + smoke-test CLI under Node
        run: |
          cd packages/rules && bun run build
          printf '<div className="flex gap-2 p-4"><span className="text-sm">ok</span></div>' > /tmp/smoke.tsx
          node dist/cli.js check /tmp/smoke.tsx
          printf '<div className="grid grid-cols-3 gap-4 p-4"><div className="col-span-2 h-10"></div><div className="h-10"></div><p className="col-span-full text-sm">grid under plain Node</p></div>' > /tmp/grid-smoke.tsx
          node dist/cli.js check /tmp/grid-smoke.tsx --viewports 600
          node dist/cli.js render /tmp/grid-smoke.tsx --viewport 600 -o /tmp/grid-smoke.png
          test -s /tmp/grid-smoke.png
          cd ../..
          node packages/rules/dist/cli.js check corpora/react/navbar-auth.tsx --props '{"signedIn":true,"userName":"CI Smoke"}' --viewports 375,768 --json > /tmp/react-check.json
          node packages/rules/dist/cli.js render corpora/react/profile-card.tsx --props '{"name":"CI Smoke","tags":["node"]}' -o /tmp/react-smoke.png
          test -s /tmp/react-smoke.png

      - name: Regenerate golden files against pinned Chromium
        run: bun run oracle

      - name: Golden drift vs committed files (informational)
        run: git diff --stat -- golden/ || true

      # Fails if any corpus case exceeds threshold (positions ≤1px,
      # sizes ≤1px, text sizes ≤2px) — engine vs freshly generated goldens.
      - name: Accuracy scoreboard
        run: bun run accuracy

      # Paint gate: engine render (SVG → resvg PNG) vs Chromium screenshots,
      # pixelmatch ≤7% mismatched pixels per case (threshold documented in
      # paint-accuracy/README.md).
      - name: Regenerate paint screenshots against pinned Chromium
        run: bun run paint-oracle

      - name: Paint accuracy gate
        run: bun run paint-accuracy

      - name: Upload accuracy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accuracy-report
          path: |
            accuracy/
            paint-accuracy/
