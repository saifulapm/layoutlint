name: accuracy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  accuracy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install pinned Chromium (the oracle)
        run: npx playwright install chromium --with-deps

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests (rules, resolver, check API)
        run: bun test

      - name: Regenerate golden files against pinned Chromium
        run: bun run oracle

      - name: Golden drift vs committed files (informational)
        run: git diff --stat -- golden/ || true

      # Fails if any corpus case exceeds threshold (positions ≤1px,
      # sizes ≤1px, text sizes ≤2px) — engine vs freshly generated goldens.
      - name: Accuracy scoreboard
        run: bun run accuracy

      - name: Upload accuracy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accuracy-report
          path: accuracy/
